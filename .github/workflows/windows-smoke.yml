name: Windows smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install npm dependencies
        run: npm ci

      - name: Validate Windows launcher
        shell: pwsh
        run: ./scripts/setup-windows.ps1 -ValidateOnly

      - name: Check image routing
        run: npm run check:image-routing

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
